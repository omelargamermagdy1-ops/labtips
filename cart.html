<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>7aloshik – Cart</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>
  {% include 'navbar.html' %}

  <div class="page-container">
    <div class="page-header">
      <h1>Your Cart</h1>
      <p>Review your order before confirming</p>
    </div>

    <div class="cart-layout">
      <div class="cart-items-panel" id="cartItemsPanel">
        <div class="empty-cart" id="emptyCart">
          <span>🛒</span>
          <p>Your cart is empty</p>
          <a href="/home" class="btn-primary">Browse Menu</a>
        </div>
        <div id="cartItemsList"></div>
      </div>

      <div class="cart-summary-panel">
        <h3>Order Summary</h3>
        <div class="summary-rows" id="summaryRows"></div>
        <div class="summary-total">
          <span>Total</span>
          <span id="summaryTotal">0 EGP</span>
        </div>

        <div class="form-group" style="margin-top:1.5rem">
          <label>Delivery Address</label>
          <textarea id="deliveryAddress" rows="2" placeholder="Enter your address in Cairo..."></textarea>
        </div>

        <button class="btn-primary full-width" id="placeOrderBtn" onclick="placeOrder()">
          Place Order 🥙
        </button>
        <div id="orderMsg" class="order-msg"></div>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='cart.js') }}"></script>
  <script>
    function renderCart() {
      const cart = getCart();
      const list  = document.getElementById('cartItemsList');
      const empty = document.getElementById('emptyCart');
      const rows  = document.getElementById('summaryRows');
      const total = document.getElementById('summaryTotal');

      if (cart.length === 0) {
        empty.style.display = 'flex';
        list.innerHTML = '';
        rows.innerHTML = '';
        total.textContent = '0 EGP';
        return;
      }
      empty.style.display = 'none';

      list.innerHTML = cart.map(item => `
        <div class="cart-row">
          <div class="cart-row-info">
            <strong>${item.name}</strong>
            <span>${item.price} EGP each</span>
          </div>
          <div class="cart-row-controls">
            <button onclick="changeQty(${item.id}, -1)">−</button>
            <span>${item.qty}</span>
            <button onclick="changeQty(${item.id}, 1)">+</button>
          </div>
          <span class="cart-row-subtotal">${item.price * item.qty} EGP</span>
          <button class="remove-btn" onclick="removeItem(${item.id})">✕</button>
        </div>
      `).join('');

      rows.innerHTML = cart.map(i => `
        <div class="summary-row"><span>${i.name} ×${i.qty}</span><span>${i.price*i.qty} EGP</span></div>
      `).join('');

      const sum = cart.reduce((a,i) => a + i.price*i.qty, 0);
      total.textContent = sum + ' EGP';
    }

    function changeQty(id, delta) {
      let cart = getCart();
      const idx = cart.findIndex(i => i.id === id);
      if (idx === -1) return;
      cart[idx].qty += delta;
      if (cart[idx].qty <= 0) cart.splice(idx, 1);
      saveCart(cart);
      renderCart();
      updateCartBadge();
    }

    function removeItem(id) {
      let cart = getCart().filter(i => i.id !== id);
      saveCart(cart);
      renderCart();
      updateCartBadge();
    }

    async function placeOrder() {
      const cart = getCart();
      const addr = document.getElementById('deliveryAddress').value.trim();
      const msg  = document.getElementById('orderMsg');
      if (!cart.length) { msg.textContent = 'Add items first!'; return; }
      if (!addr)        { msg.textContent = 'Please enter a delivery address.'; return; }

      const payload = { cart: cart.map(i => ({id: i.id, name: i.name, price: i.price, qty: i.qty})), address: addr };
      const res  = await fetch('/api/orders/place', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      const data = await res.json();

      msg.style.color = res.ok ? '#27ae60' : '#e74c3c';
      msg.textContent = res.ok ? `✅ ${data.message} (Order #${data.order_id})` : data.error;

      if (res.ok) {
        saveCart([]);
        updateCartBadge();
        renderCart();
      }
    }

    renderCart();
  </script>
</body>
</html>
