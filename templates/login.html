<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>7aloshik – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="login-page">

  <div class="login-wrapper">

    <div class="login-brand">
      <div class="brand-icon">🥙</div>
      <h1 class="brand-name">7aloshik</h1>
      <p class="brand-tagline">حلو شيك – Cairo's Finest Delivery</p>
    </div>

    <div class="login-card">
      <h2>Welcome Back</h2>
      <p class="login-sub">Sign in to continue ordering</p>

      {% if error %}
        <div class="alert-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" placeholder="e.g. mohsen" autocomplete="off" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-primary full-width">Login →</button>
      </form>

      <div class="demo-hint">
        <span>Demo accounts:</span>
        <code>mohsen / helloworld</code>
        <code>tips / tipsman</code>
      </div>
    </div>

  </div>

  <div class="login-bg-decoration">
    <span>🥘</span><span>🫔</span><span>🍵</span><span>🧆</span><span>🥐</span><span>🍲</span>
  </div>

</body>
</html>
